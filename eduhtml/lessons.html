            // Render controls translations
            const dict = COMPONENT_TRANSLATIONS[lang];
            document.getElementById('btn-back-dashboard').textContent = dict["btn-back-dashboard"];
            document.getElementById('label-output').textContent = dict["label-output"];
            document.getElementById('label-lesson-check').textContent = dict["label-lesson-check"];

            // Render Lesson Contents
            document.getElementById('lesson-category').textContent = langData.category;
            document.getElementById('lesson-title').textContent = langData.title;
            document.getElementById('lesson-body').innerHTML = langData.body;
            
            // Render Live Demo Output
            const previewContainer = document.getElementById('lesson-preview-container');
            const previewBox = document.getElementById('lesson-preview-box');
            if (lesson[lang].demoHtml) {
                previewBox.innerHTML = lesson[lang].demoHtml;
                previewContainer.style.display = 'block';
            } else {
                previewContainer.style.display = 'none';
            }

            // Render Mini Check Question
            const quizBox = document.getElementById('lesson-quiz-box');
            const quizQuestion = document.getElementById('lesson-quiz-question');
            const quizOptions = document.getElementById('lesson-quiz-options');
            const quizFeedback = document.getElementById('lesson-quiz-feedback');

            quizQuestion.textContent = langData.question;
            quizOptions.innerHTML = '';
            quizFeedback.style.display = 'none';

            langData.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'lesson-quiz-option';
                btn.textContent = opt.text;
                btn.onclick = () => checkAnswer(opt, btn, langData.explanation);
                quizOptions.appendChild(btn);
            });
            quizBox.style.display = 'block';

            // Navigation buttons updates
            const prevBtn = document.getElementById('prev-lesson-btn');
            const nextBtn = document.getElementById('next-lesson-btn');

            if (lesson.prev) {
                prevBtn.style.opacity = '1';
                prevBtn.style.pointerEvents = 'auto';
                prevBtn.textContent = dict["btn-prev"];
                prevBtn.onclick = () => navigateToLesson(lesson.prev);
            } else {
                prevBtn.style.opacity = '0.4';
                prevBtn.style.pointerEvents = 'none';
                prevBtn.textContent = dict["btn-prev"];
            }

            if (lesson.next) {
                nextBtn.textContent = dict["btn-next"];
                nextBtn.onclick = () => navigateToLesson(lesson.next);
            } else {
                nextBtn.textContent = dict["btn-finish-quiz"];
                nextBtn.onclick = () => window.location.href = 'quiz.html';
            }
        }

        // Navigate
        function navigateToLesson(lessonId) {
            window.location.search = `?lesson=${lessonId}`;
        }

        // Check mini quiz options
        function checkAnswer(option, element, explanation) {
            const options = document.querySelectorAll('.lesson-quiz-option');
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent === option.text) {
                    if (option.correct) {
                        opt.classList.add('correct');
                    } else {
                        opt.classList.add('incorrect');
                    }
                }
            });

            const feedback = document.getElementById('lesson-quiz-feedback');
            feedback.style.display = 'block';
            
            const lang = typeof EduHTML !== 'undefined' ? EduHTML.getLanguage() : 'en';
            
            if (option.correct) {
                feedback.className = 'explanation-box correct';
                feedback.innerHTML = explanation;
                
                const curId = getQueryParam('lesson');
                if (typeof EduHTML !== 'undefined') {
                    EduHTML.completeLesson(curId);
                }
            } else {
                feedback.className = 'explanation-box incorrect';
                feedback.innerHTML = lang === 'en' ? `❌ Incorrect.` : `❌ ভুল উত্তর।`;
                setTimeout(() => {
                    options.forEach(opt => {
                        opt.style.pointerEvents = 'auto';
                        opt.classList.remove('incorrect', 'correct');
                    });
                    feedback.style.display = 'none';
                }, 2000);
            }
        }

        // Language change event subscription
        window.onLanguageChange = function() {
            loadLesson(getQueryParam('lesson'));
        };

        // Initialize rendering
        const activeLessonId = getQueryParam('lesson');
        loadLesson(activeLessonId);
    </script>
</body>
</html>
